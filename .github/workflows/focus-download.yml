name: Baixar Focus

on:
  schedule:
    # Toda segunda às 9h15 BRT = 12h15 UTC.
    - cron: "15 12 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  baixar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Baixar o PDF do Focus
        run: python src/baixar_focus.py

      - name: Extrair o texto
        run: python src/extrair_texto.py

      - name: Commitar PDF e texto
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/focus_*.pdf data/focus_*.txt
          if git diff --cached --quiet; then
            echo "Nada novo para commitar."
          else
            git commit -m "Focus: download automático"
            git push
          fi
